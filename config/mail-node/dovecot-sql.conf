# Dovecot: SQL authentication and userdb
# Location: /etc/dovecot/dovecot-sql.conf
#
# In dovecot.conf:
#   passdb { driver = sql; args = /etc/dovecot/dovecot-sql.conf }
#   userdb { driver = sql; args = /etc/dovecot/dovecot-sql.conf }
#
# REQUIRED in dovecot.conf for quota enforcement:
#   mail_plugins = $mail_plugins quota
#   protocol imap { mail_plugins = $mail_plugins imap_quota }
#   plugin { quota = maildir:User quota; quota_rule = *:storage=1G }
#   plugin { quota_grace = 10%% }
#   plugin { quota_status_success = DUNNO }
#   plugin { quota_status_nouser = DUNNO }
#   plugin { quota_status_overquota = "552 5.2.2 Mailbox is full" }

driver = pgsql
connect = host=localhost port=5433 dbname=musedock_panel user=musedock_mail password=CHANGE_ME

# Password scheme: BLF-CRYPT (bcrypt) — stored with {BLF-CRYPT} prefix
default_pass_scheme = BLF-CRYPT

# Authentication query — only active accounts can log in
password_query = SELECT email AS user, password_hash AS password \
  FROM mail_accounts \
  WHERE email = '%u' AND status = 'active'

# User lookup — maps email to UID/GID/home/quota
user_query = SELECT \
    email AS user, \
    5000 AS uid, \
    5000 AS gid, \
    home_dir AS home, \
    CONCAT('*:bytes=', quota_mb * 1048576) AS quota_rule \
  FROM mail_accounts \
  WHERE email = '%u' AND status = 'active'

# Iterate query — for doveadm commands that need to list all users
iterate_query = SELECT email AS user FROM mail_accounts WHERE status = 'active'
