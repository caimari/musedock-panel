# MuseDock Fail2Ban jails
# Installed by install.sh / update.sh — do not edit manually

[musedock-panel]
enabled  = true
filter   = musedock-panel
logpath  = /var/log/musedock-panel-auth.log
port     = 8444
maxretry = 5
findtime = 600
bantime  = 3600
action   = iptables-multiport[name=musedock-panel, port="8444", protocol=tcp]

[musedock-portal]
enabled  = true
filter   = musedock-portal
logpath  = /var/log/musedock-portal-auth.log
port     = 8446
maxretry = 10
findtime = 600
bantime  = 1800
action   = iptables-multiport[name=musedock-portal, port="8446", protocol=tcp]

[musedock-wordpress]
enabled  = true
filter   = musedock-wordpress
logpath  = /var/log/caddy/hosting-access.log
port     = http,https
maxretry = 10
findtime = 300
bantime  = 3600
action   = iptables-multiport[name=musedock-wordpress, port="80,443", protocol=tcp]
