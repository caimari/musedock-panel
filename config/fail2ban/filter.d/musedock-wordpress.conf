# Fail2Ban filter for WordPress brute force via Caddy JSON access logs
# Matches POST requests to wp-login.php and xmlrpc.php
#
# Uses Cf-Connecting-Ip (real visitor IP behind Cloudflare proxy) when present,
# falls back to client_ip for direct connections (no Cloudflare).
# This prevents banning Cloudflare edge IPs which would block all visitors.

[Definition]
# Priority 1: Match Cf-Connecting-Ip (domains behind Cloudflare proxy)
failregex = ^\s*\{.*"Cf-Connecting-Ip"\s*:\s*\[\s*"<HOST>".*"method"\s*:\s*"POST".*"uri"\s*:\s*"(/wp-login\.php|.*/xmlrpc\.php).*$
            ^\s*\{.*"method"\s*:\s*"POST".*"uri"\s*:\s*"(/wp-login\.php|.*/xmlrpc\.php).*"Cf-Connecting-Ip"\s*:\s*\[\s*"<HOST>".*$
# Priority 2: Match client_ip for direct connections (no Cloudflare)
            ^\s*\{(?!.*"Cf-Connecting-Ip").*"client_ip"\s*:\s*"<HOST>".*"method"\s*:\s*"POST".*"uri"\s*:\s*"(/wp-login\.php|.*/xmlrpc\.php).*$
            ^\s*\{(?!.*"Cf-Connecting-Ip").*"method"\s*:\s*"POST".*"uri"\s*:\s*"(/wp-login\.php|.*/xmlrpc\.php).*"client_ip"\s*:\s*"<HOST>".*$

ignoreregex =

datepattern = "ts"\s*:\s*{EPOCH}
