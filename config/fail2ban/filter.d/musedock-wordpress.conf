# Fail2Ban filter for WordPress brute force via Caddy JSON access logs
# Matches POST requests to wp-login.php and xmlrpc.php

[Definition]
failregex = ^\s*\{.*"client_ip"\s*:\s*"<HOST>".*"method"\s*:\s*"POST".*"uri"\s*:\s*"(/wp-login\.php|.*/xmlrpc\.php).*$
            ^\s*\{.*"method"\s*:\s*"POST".*"uri"\s*:\s*"(/wp-login\.php|.*/xmlrpc\.php).*"client_ip"\s*:\s*"<HOST>".*$

ignoreregex =

datepattern = "ts"\s*:\s*{EPOCH}
